name: check-boletas

on:
  schedule:
    # GitHub no garantiza puntualidad exacta con cron, especialmente en
    # horas pico. */10 es lo que pediste; si ves retrasos frecuentes,
    # considera subir a */15.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}   # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write   # necesario para poder commitear estado.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar navegador de Playwright
        run: patchright install --with-deps chromium

      - name: Instalar Xvfb (display virtual para modo headed)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Revisar disponibilidad
        run: xvfb-run --auto-servernum python check_boletas.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Subir screenshot de diagnóstico si falló
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          if-no-files-found: ignore

      - name: Guardar estado si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado.json
          git diff --staged --quiet || git commit -m "actualizar estado"
          git push
